name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    uses: Minicon-eG/.github/.github/workflows/deploy-static-site.yml@main
    with:
      site_name: felsland-grundschule
      domain: felsland-grundschule.minicon.eu
      cloudflare_pages_project: website-felsland-grundschule
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
