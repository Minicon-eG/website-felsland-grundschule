name: Deploy Felsland Grundschule

on:
  push:
    branches: [main, preview]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "Build-Ordner 'out' nicht gefunden!"
            exit 1
          fi
          echo "Build: $(find out -type f | wc -l) Dateien"

      - name: Inject site marker
        run: |
          MARKER="<!-- minicon:felsland-grundschule -->"
          COUNT=0
          for HTML in $(find out -name "*.html" -type f); do
            if grep -q "</head>" "$HTML" && ! grep -q "minicon:felsland-grundschule" "$HTML"; then
              sed -i "s|</head>|${MARKER}\n</head>|" "$HTML"
              COUNT=$((COUNT+1))
            fi
          done
          echo "Marker injected in $COUNT HTML files"

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@3 pages deploy out --project-name=website-felsland-grundschule --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Purge Cloudflare Cache
        run: |
          ZONE_ID="14fde5a7044280362d78ab47f2d41390"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | jq '.success' && echo "Cache gepurged" || echo "Cache Purge fehlgeschlagen (non-fatal)"
